{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="auth-form">
    <h2>Start invoicing in USD</h2>
    <form method="POST">
        <div class="form-group">
            <label>Business Name (optional)</label>
            <input type="text" name="business_name" class="form-control" placeholder="Your business name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required class="form-control" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required class="form-control" placeholder="Create a strong password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
